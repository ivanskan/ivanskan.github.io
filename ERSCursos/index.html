<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ERS - Capacitaciones</title>
<link href="assets/ers.ico" rel="icon">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
  body{
    background-color: var(--bs-body-bg);
    color: var(--bs-body-color);
    transition: background 0.3s ease, color 0.3s ease;
  }
</style>
</head>

<body data-bs-theme="light">

  <div class="container py-3 d-flex justify-content-between align-items-center">
    <div id="logoHeader" class="d-none">
      <img src="assets/logo.png" class="d-none d-sm-block" style="height:70px;">
      <img src="assets/logo-min.png" class="d-block d-sm-none" style="height:40px;">
    </div>
    <button class="btn btn-outline-secondary ms-auto" onclick="toggleModo()">
      <i id="iconModo" class="bi bi-moon"></i>
    </button>
  </div>

  <div class="container py-5">

    <div id="login" class="mx-auto" style="max-width:400px;">
      <div class="card p-4 shadow text-center">
      <img src="assets/logo.png" class="img-fluid mb-3 px-5">
      <h4 class="mb-3 fs-4">Consulta de Capacitación</h4>
      <input type="text" id="dni" class="form-control mb-3" placeholder="Ingrese DNI">
      <button id="btnBuscar" class="btn btn-primary w-100" onclick="buscar()" disabled>
      Cargando...
      </button>
      </div>
    </div>

    <div id="dashboard" class="d-none">

      <h4 id="nombre" class="mb-1"></h4>
      <p id="cod" class="text-muted mb-4"></p>

      <div class="row text-center mb-4 g-2">
        <div class="col-4">
          <div class="card p-3 shadow-sm">
            <i class="bi bi-collection fs-3"></i>
            <h6>Total</h6>
            <h3 id="total"></h3>
          </div>
        </div>
        <div class="col-4">
          <div class="card p-3 shadow-sm">
            <i class="bi bi-check-circle text-success fs-3"></i>
            <h6>Vigentes</h6>
            <h3 id="vigentes" class="text-success"></h3>
          </div>
        </div>
        <div class="col-4">
          <div class="card p-3 shadow-sm">
            <i class="bi bi-exclamation-circle text-warning fs-3"></i>
            <h6>Por vencer</h6>
            <h3 id="porVencer" class="text-warning"></h3>
          </div>
        </div>
      </div>

      <div class="table-responsive">
        <table class="table table-bordered table-sm">
          <thead class="table-light">
            <tr>
              <th>Curso</th>
              <th>Empresa</th>
              <th>Fecha</th>
              <th>Vence</th>
              <th>Estado</th>
            </tr>
          </thead>
          <tbody id="tabla"></tbody>
        </table>
      </div>

      <button class="btn btn-secondary mt-3" onclick="volver()">Volver</button>

    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="app.js"></script>

</body>
</html>
